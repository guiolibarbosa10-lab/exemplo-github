<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Próximos Shows</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Montserrat', sans-serif;
      background:#101010;
      color:white;
      min-height:100vh;
    }

    nav{
      background:#000;
      padding:20px 10%;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    nav a{
      color:white;
      text-decoration:none;
      margin-left:20px;
      font-weight:600;
    }

    .container{
      width:90%;
      max-width:1200px;
      margin:auto;
      padding:60px 0;
    }

    h1{
      text-align:center;
      margin-bottom:50px;
      font-size:3rem;
    }

    .shows{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));
      gap:25px;
    }

    .card{
      background:#1d1d1d;
      padding:30px;
      border-radius:20px;
      transition:0.4s;
      border:1px solid rgba(255,255,255,0.1);
      position:relative;
      overflow:hidden;
    }

    .card:hover{
      transform:translateY(-10px);
      box-shadow:0 10px 30px rgba(0,0,0,0.5);
    }

    .cidade{
      font-size:1.8rem;
      font-weight:700;
      margin-bottom:10px;
    }

    .data{
      color:#bdbdbd;
      margin-bottom:20px;
    }

    .btn{
      border:none;
      padding:12px 25px;
      border-radius:50px;
      cursor:pointer;
      font-weight:700;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.05);
    }

    .popup{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.7);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:999;
    }

    .popup-content{
      background:#1b1b1b;
      padding:40px;
      border-radius:20px;
      text-align:center;
      width:90%;
      max-width:400px;
      animation:aparecer 0.4s ease;
    }

    .popup-content h2{
      margin-bottom:20px;
    }

    .fechar{
      margin-top:25px;
      background:white;
      color:black;
    }

    @keyframes aparecer{

      from{
        transform:scale(0.7);
        opacity:0;
      }

      to{
        transform:scale(1);
        opacity:1;
      }

    }

  </style>
</head>
<body>

  <nav>

    <h2>Shows</h2>

    <div>
      <a href="index.html">Início</a>
    </div>

  </nav>

  <div class="container">

    <h1>Próxima Rotina de Shows</h1>

    <div class="shows">

      <div class="card">
        <div class="cidade">São Paulo</div>
        <div class="data">15 Junho 2026</div>

        <button class="btn" onclick="abrirPopup('São Paulo')">
          Ver Detalhes
        </button>
      </div>

      <div class="card">
        <div class="cidade">Rio de Janeiro</div>
        <div class="data">20 Junho 2026</div>

        <button class="btn" onclick="abrirPopup('Rio de Janeiro')">
          Ver Detalhes
        </button>
      </div>

      <div class="card">
        <div class="cidade">Curitiba</div>
        <div class="data">28 Junho 2026</div>

        <button class="btn" onclick="abrirPopup('Curitiba')">
          Ver Detalhes
        </button>
      </div>

    </div>

  </div>

  <!-- POPUP -->

  <div class="popup" id="popup">

    <div class="popup-content">

      <h2 id="tituloShow"></h2>

      <p>
        Um espetáculo com música clássica, trilhas famosas
        e muito humor ao estilo Lord Vinheteiro.
      </p>

      <button class="btn fechar" onclick="fecharPopup()">
        Fechar
      </button>

    </div>

  </div>

  <script>

    const popup = document.getElementById("popup");
    const titulo = document.getElementById("tituloShow");

    function abrirPopup(cidade){

      titulo.innerText = "Show em " + cidade;

      popup.style.display = "flex";

    }

    function fecharPopup(){

      popup.style.display = "none";

    }

    window.addEventListener("click", (e) => {

      if(e.target === popup){

        fecharPopup();

      }

    });

  </script>

</body>
</html>
